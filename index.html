<script>
  const audio = document.getElementById("bgMusic");
  const musicToggleBtn = document.getElementById("musicToggleBtn");
  const musicStopBtn = document.getElementById("musicStopBtn");
  const audioStatus = document.getElementById("audioStatus");

  let previewPlayed = false;
  let fullPlaybackStarted = false;
  let previewTimeout = null;
  let fadeInterval = null;

  function clearAudioTimers() {
    if (previewTimeout) {
      clearTimeout(previewTimeout);
      previewTimeout = null;
    }

    if (fadeInterval) {
      clearInterval(fadeInterval);
      fadeInterval = null;
    }
  }

  function updateStatus(message) {
    audioStatus.textContent = message;
  }

  function setPlayVisual() {
    musicToggleBtn.innerHTML = '<span class="audio-icon">🔥</span>';
    musicToggleBtn.setAttribute("aria-label", "Play music");
    musicToggleBtn.setAttribute("title", "Play music");
  }

  function setPauseVisual() {
    musicToggleBtn.innerHTML = '<span class="audio-icon">⏸</span>';
    musicToggleBtn.setAttribute("aria-label", "Pause music");
    musicToggleBtn.setAttribute("title", "Pause music");
  }

  function stopAudio(resetToStart = true) {
    clearAudioTimers();
    audio.pause();
    audio.volume = 1;

    if (resetToStart) {
      audio.currentTime = 0;
    }

    fullPlaybackStarted = false;
    setPlayVisual();
    updateStatus("Sound stopped");
  }

  function fadeOutAndStop() {
    clearAudioTimers();

    fadeInterval = setInterval(() => {
      if (audio.volume > 0.1) {
        audio.volume -= 0.1;
      } else {
        clearInterval(fadeInterval);
        fadeInterval = null;
        audio.pause();
        audio.currentTime = 0;
        audio.volume = 1;
        setPlayVisual();
        updateStatus("Preview ended");
      }
    }, 180);
  }

  async function safePlay() {
    try {
      await audio.play();
      return true;
    } catch (error) {
      console.error("Audio play failed:", error);
      updateStatus("Audio blocked or file missing");
      return false;
    }
  }

  async function startPreview() {
    if (previewPlayed || fullPlaybackStarted) return;

    previewPlayed = true;
    clearAudioTimers();
    audio.loop = false;
    audio.currentTime = 0;
    audio.volume = 1;

    const played = await safePlay();
    if (!played) return;

    setPauseVisual();
    updateStatus("Preview playing");

    previewTimeout = setTimeout(() => {
      fadeOutAndStop();
    }, 10000);
  }

  async function startFullMusic() {
    clearAudioTimers();
    fullPlaybackStarted = true;
    audio.loop = true;
    audio.volume = 1;

    const played = await safePlay();
    if (!played) {
      fullPlaybackStarted = false;
      return;
    }

    setPauseVisual();
    updateStatus("Music playing");
  }

  function pauseFullMusic() {
    clearAudioTimers();
    audio.pause();
    setPlayVisual();
    updateStatus("Music paused");
  }

  function handleFirstInteraction() {
    startPreview();
    document.removeEventListener("click", handleFirstInteraction);
    document.removeEventListener("keydown", handleFirstInteraction);
    document.removeEventListener("touchstart", handleFirstInteraction);
  }

  document.addEventListener("click", handleFirstInteraction, { once: true });
  document.addEventListener("keydown", handleFirstInteraction, { once: true });
  document.addEventListener("touchstart", handleFirstInteraction, { once: true });

  musicToggleBtn.addEventListener("click", function (event) {
    event.stopPropagation();

    if (!audio.paused && !audio.ended) {
      pauseFullMusic();
    } else {
      startFullMusic();
    }
  });

  musicStopBtn.addEventListener("click", function (event) {
    event.stopPropagation();
    stopAudio(true);
  });

  audio.addEventListener("loadeddata", function () {
    updateStatus("Audio ready");
  });

  audio.addEventListener("error", function () {
    console.error("Audio error:", audio.error);
    updateStatus("Audio file not found");
  });

  audio.addEventListener("ended", function () {
    if (!audio.loop) {
      setPlayVisual();
      updateStatus("Music ended");
    }
  });
</script>
